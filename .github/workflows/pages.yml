name: Deploy static site to Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    # Republier le site pour rafraîchir remaining-seats.json depuis le CSV (secret SHEET_CSV_URL).
    # Toutes les 15 min. « Nuit » = pas de runs quand il est entre **01h et 08h (Europe/Paris)**.
    # GitHub cron = **UTC** uniquement. En **heure d’été (CEST, UTC+2)** : 01h–08h Paris ↔ **23h–05h UTC**
    # → runs aux heures UTC **6–22** inclus (`*/15 6-22`). Premier run « jour » ≈ **08h00 Paris**, dernier ≈ **00h45** Paris.
    # En **heure d’hiver (CET, UTC+1)** la même plage UTC décale d’1 h côté Paris (premier run ≈ 09h) ; pour coller au 08h Paris en hiver, remplacer par `*/15 7-23 * * *`.
    # Hors créneau : aucun run planifié ; un push sur main ou workflow_dispatch déclenche toujours un build.
    - cron: "*/15 6-22 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      # imagemagick seul fournit souvent AVIF en lecture seule (r--) ; l’encodeur
      # est fourni par le plugin libheif (AOM) pour l’écriture (rw+).
      - name: Install ImageMagick (AVIF)
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick libheif-plugin-aomenc
          IM="$(command -v magick || command -v convert)"
          "$IM" -list format | grep AVIF
          "$IM" -list format | grep AVIF | grep -q rw+ || { echo 'Écriture AVIF non disponible'; exit 1; }
      - name: Build
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

