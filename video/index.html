<style>
:root{--bg:#F5F1E8;--text:#2C2C2C;--muted:#6B6B6B;--white:#FFF;--navy:#21254e;--blue-charte:#21428f;--cyan:#01b3e4;--coral:#e95842;--accent:#e95842;--blue:#01b3e4;--font-heading:"Hubot Sans",system-ui,sans-serif;--titre-1-size:clamp(2rem,4vw,3rem);--titre-1-weight:800;}
*{box-sizing:border-box;}
html,body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;font-size:18px;line-height:1.6;}
a{color:var(--blue);text-decoration:none;}
a:hover{text-decoration:underline;}
.container{width:min(900px,100%);margin-inline:auto;padding:0 16px;}
.watch-page{min-height:100vh;padding:24px 0 48px;}
.watch-page h1{font-family:var(--font-heading);font-size:var(--titre-1-size);font-weight:var(--titre-1-weight);margin:0 0 8px;}
.watch-page .lead{margin:0 0 24px;color:var(--muted);font-size:1rem;}
.watch-video-wrap{position:relative;width:100%;max-width:100%;margin:0 auto 32px;border-radius:12px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.15);aspect-ratio:1000/607;background:#000;}
.watch-video-wrap video{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;}
.watch-play-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.3);cursor:pointer;border:none;padding:0;}
.watch-play-overlay:hover{background:rgba(0,0,0,.4);}
.watch-play-overlay svg{color:var(--white);opacity:.95;}
.watch-page .back-links{margin-top:24px;}
.watch-page .back-links a{display:inline-block;margin-right:16px;}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Hubot+Sans:wght@400;600;800&display=swap">
</head>
<body>
<main class="watch-page">
  <div class="container">
    <h1>Vidéo teaser Festibask'Impro</h1>
    <p class="lead">Découvrez le teaser du festival d'improvisation théâtrale d'Anglet : 15–17 mai 2026 à la Patinoire de la Barre.</p>
    <div class="watch-video-wrap">
      <video
        id="watchVideo"
        poster="/assets/img/long/festibask-impro__logo_ss-baseline_fd-fonce-720w.avif"
        controls
        preload="none"
        title="Vidéo teaser Festibask'Impro">
        <source src="/assets/video/festibask-impro-presentation.webm" type="video/webm">
        <source src="/assets/video/festibask-impro-presentation.mp4" type="video/mp4">
      </video>
      <button type="button" class="watch-play-overlay" id="watchPlayOverlay" aria-label="Lire la vidéo">
        <span aria-hidden="true">
          <svg width="80" height="80" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 5v14l11-7L8 5z"/>
          </svg>
        </span>
      </button>
    </div>
    <div class="back-links">
      <a href="/">Retour à l'accueil</a>
      <a href="/#programme">Programme</a>
      <a href="/#stages">Stages</a>
    </div>
  </div>
</main>
<script>
(function () {
  var video = document.getElementById('watchVideo');
  var overlay = document.getElementById('watchPlayOverlay');
  if (!video || !overlay) return;
  function play() {
    video.play().catch(function () {});
    overlay.style.display = 'none';
  }
  overlay.addEventListener('click', play);
  video.addEventListener('click', function () { overlay.style.display = 'none'; });
  video.addEventListener('play', function () { overlay.style.display = 'none'; });
  video.addEventListener('pause', function () {
    if (video.currentTime > 0 && !video.ended) overlay.style.display = 'flex';
  });
  video.addEventListener('ended', function () { overlay.style.display = 'flex'; });
})();
</script>
</body>
